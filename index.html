<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>4x4 Grid</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(4, 50px); gap: 5px; }
        .cell { width: 50px; height: 50px; border: 1px solid #ccc; cursor: pointer; }
        .active { background-color: #ff4757; }
    </style>
</head>
<body>
    <div class="grid" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.onclick = () => cell.classList.toggle('active');
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
