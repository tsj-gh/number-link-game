<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multi-Connect Puzzle</title>
    <style>
        body { text-align: center; font-family: sans-serif; touch-action: none; background: #fdfdfd; margin: 0; padding-top: 10px; }
        .config { background: #eee; padding: 10px; margin-bottom: 10px; font-size: 14px; }
        canvas { background: #fff; border: 1px solid #ddd; display: block; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); touch-action: none; border-radius: 8px; }
        .info { margin: 10px; font-weight: bold; color: #555; min-height: 24px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 20px; border: none; background: #34495e; color: white; font-weight: bold; }
        select { padding: 5px; margin: 0 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="config">
        サイズ: <select id="gridSelect">
            <option value="4" selected>4x4</option>
            <option value="5">5x5</option>
            <option value="6">6x6</option>
            <option value="8">8x8</option>
            <option value="10">10x10</option>
        </select>
        ペア数: <select id="pairSelect">
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="6">6</option>
            <option value="9">9</option>
        </select>
        <button id="resetBtn" onclick="initGame()">生成</button>
    </div>

    <div id="status" class="info">設定を選んで生成してね</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        
        let gridSize, pairCount;
        const padding = 40;
        let spacing, canvasSize;

        let numbers = [];
        let finishedLines = []; 
        let currentPath = []; 
        let isDrawing = false;
        let startNum = null;
        let loadingInterval;

        const colors = ["#ff4757", "#2e86de", "#2ed573", "#ffa502", "#a29bfe", "#e17055", "#00cec9", "#6c5ce7", "#fdcb6e"];

        function startLoadingAnim() {
            let dots = 0;
            loadingInterval = setInterval(() => {
                dots = (dots + 1) % 4;
                statusEl.innerText = "生成中" + ".".repeat(dots);
            }, 300);
        }

        async function generateLevel() {
            return new Promise((resolve) => {
                const attempt = () => {
                    let path = [];
                    let startX = Math.floor(Math.random() * gridSize);
                    let startY = Math.floor(Math.random() * gridSize);
                    path = [{x: startX, y: startY}];
                    let visited = new Set([`${startX},${startY}`]);
                    
                    // 1本のハミルトン路を生成
                    for (let i = 0; i < 500; i++) {
                        let last = path[path.length - 1];
                        let neighbors = [{x:last.x+1, y:last.y},{x:last.x-1, y:last.y},{x:last.x, y:last.y+1},{x:last.x, y:last.y-1}]
                            .filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !visited.has(`${n.x},${n.y}`));
                        if (neighbors.length === 0) break;
                        neighbors.sort((a,b) => getDeg(a, visited)-getDeg(b, visited));
                        let next = neighbors[0];
                        path.push(next); visited.add(`${next.x},${next.y}`);
                    }

                    if (visited.size === gridSize * gridSize) {
                        // 成功！pathをpairCount個に等分に近い形で分割
                        numbers = [];
                        let step = Math.floor(path.length / pairCount);
                        for(let m=0; m < pairCount; m++) {
                            let sIdx = m * step;
                            let eIdx = (m === pairCount - 1) ? path.length - 1 : (m + 1) * step - 1;
                            numbers.push({x: path[sIdx].x, y: path[sIdx].y, val: m+1, color: colors[m]});
                            numbers.push({x: path[eIdx].x, y: path[eIdx].y, val: m+1, color: colors[m]});
                        }
                        resolve();
                    } else { setTimeout(attempt, 0); }
                };
                const getDeg = (p, v) => [{x:p.x+1,y:p.y},{x:p.x-1,y:p.y},{x:p.x,y:p.y+1},{x:p.x,y:p.y-1}]
                    .filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !v.has(`${n.x},${n.y}`)).length;
                attempt();
            });
        }

        async function initGame() {
            gridSize = parseInt(document.getElementById('gridSelect').value);
            pairCount = parseInt(document.getElementById('pairSelect').value);
            
            canvasSize = Math.min(window.innerWidth - 20, 500);
            canvas.width = canvasSize; canvas.height = canvasSize;
            spacing = (canvasSize - padding * 2) / (gridSize - 1);
            
            finishedLines = []; currentPath = [];
            startLoadingAnim();
            document.getElementById('resetBtn').disabled = true;

            await generateLevel();
            
            clearInterval(loadingInterval);
            document.getElementById('resetBtn').disabled = false;
            statusEl.innerText = `${gridSize}x${gridSize} (${pairCount}ペア) - 全マス埋めて！`;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 点の描画
            ctx.fillStyle = "#ddd";
            for(let i=0; i<gridSize; i++) {
                for(let j=0; j<gridSize; j++) {
                    ctx.beginPath(); ctx.arc(padding + i*spacing, padding + j*spacing, 3, 0, Math.PI*2); ctx.fill();
                }
            }
            const drawPath = (pList, color, alpha=1) => {
                ctx.strokeStyle = color; ctx.globalAlpha = alpha; ctx.lineWidth = spacing * 0.4;
                ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.beginPath();
                pList.forEach((p, i) => {
                    const vx = padding + p.x * spacing; const vy = padding + p.y * spacing;
                    if (i === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
                });
                ctx.stroke(); ctx.globalAlpha = 1;
            };
            finishedLines.forEach(l => drawPath(l.path, l.color));
            if (isDrawing) drawPath(currentPath, startNum.color, 0.5);
            
            // 数字のサイズをグリッドに合わせて調整
            let radius = spacing * 0.35;
            ctx.font = `bold ${radius}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            numbers.forEach(num => {
                const x = padding + num.x * spacing; const y = padding + num.y * spacing;
                ctx.fillStyle = num.color; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "white"; ctx.fillText(num.val, x, y);
            });
        }

        // --- 操作ロジック ---
        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const x = Math.round((clientX - rect.left - padding) / spacing);
            const y = Math.round((clientY - rect.top - padding) / spacing);
            if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) return {x, y};
            return null;
        }

        canvas.addEventListener('touchstart', (e) => {
            const p = getGridPos(e); if (!p) return;
            const num = numbers.find(n => n.x === p.x && n.y === p.y);
            if (num) {
                finishedLines = finishedLines.filter(l => l.val !== num.val);
                isDrawing = true; startNum = num; currentPath = [{x: p.x, y: p.y}];
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDrawing) return; e.preventDefault();
            const p = getGridPos(e); if (!p) return;
            const last = currentPath[currentPath.length - 1];
            if ((Math.abs(p.x - last.x) + Math.abs(p.y - last.y)) === 1) {
                const isOccupied = finishedLines.some(l => l.path.some(pt => pt.x === p.x && pt.y === p.y));
                const isCurrent = currentPath.some(pt => pt.x === p.x && pt.y === p.y);
                const otherNum = numbers.find(n => n.x === p.x && n.y === p.y);
                if (!isOccupied && !isCurrent) {
                    if (!otherNum || (otherNum.val === startNum.val && (p.x !== startNum.x || p.y !== startNum.y))) {
                        currentPath.push(p); draw();
                    }
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', () => {
            if (!isDrawing) return;
            const last = currentPath[currentPath.length - 1];
            const endNum = numbers.find(n => n.x === last.x && n.y === last.y);
            if (endNum && endNum.val === startNum.val && (endNum.x !== startNum.x || endNum.y !== startNum.y)) {
                finishedLines.push({ path: [...currentPath], color: startNum.color, val: startNum.val });
                checkClear();
            }
            isDrawing = false; draw();
        });

        function checkClear() {
            const usedCount = new Set();
            finishedLines.forEach(l => l.path.forEach(p => usedCount.add(`${p.x},${p.y}`)));
            if (usedCount.size === gridSize * gridSize) statusEl.innerText = "✨ PERFECT CLEAR! ✨";
        }

        initGame();
    </script>
</body>
</html>
