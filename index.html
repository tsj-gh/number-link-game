<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Connect - Merge & Split</title>
    <style>
        body { text-align: center; font-family: sans-serif; touch-action: none; background: #fdfdfd; margin: 0; padding-top: 10px; }
        .config { background: #eee; padding: 10px; margin-bottom: 10px; font-size: 14px; }
        canvas { background: #fff; border: 1px solid #ddd; display: block; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); touch-action: none; border-radius: 8px; }
        .info { margin: 10px; font-weight: bold; color: #555; min-height: 24px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 20px; border: none; background: #34495e; color: white; font-weight: bold; }
        select { padding: 5px; margin: 0 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="config">
        サイズ: <select id="gridSelect"><option value="4" selected>4x4</option><option value="5">5x5</option><option value="6">6x6</option><option value="8">8x8</option><option value="10">10x10</option></select>
        ペア数: <select id="pairSelect"><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="6">6</option><option value="9">9</option></select>
        <button id="resetBtn" onclick="initGame()">生成</button>
    </div>
    <div id="status" class="info">生成中...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        let gridSize, pairCount, spacing, canvasSize;
        const padding = 40;

        let numbers = [];
        let paths = {}; // { val: [ [{x,y}...], [{x,y}...] ] } ペアごとに最大2本の線を許可
        let isDrawing = false;
        let activeVal = null, activePathIdx = null;
        let lastDownPos = null;

        const colors = ["#ff4757", "#2e86de", "#2ed573", "#ffa502", "#a29bfe", "#e17055", "#00cec9", "#6c5ce7", "#fdcb6e"];

        async function generateLevel() {
            return new Promise((resolve) => {
                const attempt = () => {
                    let path = [];
                    let startX = Math.floor(Math.random() * gridSize), startY = Math.floor(Math.random() * gridSize);
                    path = [{x: startX, y: startY}];
                    let visited = new Set([`${startX},${startY}`]);
                    for (let i = 0; i < 500; i++) {
                        let last = path[path.length - 1];
                        let neighbors = [{x:last.x+1, y:last.y},{x:last.x-1, y:last.y},{x:last.x, y:last.y+1},{x:last.x, y:last.y-1}]
                            .filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !visited.has(`${n.x},${n.y}`));
                        if (neighbors.length === 0) break;
                        neighbors.sort((a,b) => getDeg(a, visited)-getDeg(b, visited));
                        path.push(neighbors[0]); visited.add(`${neighbors[0].x},${neighbors[0].y}`);
                    }
                    if (visited.size === gridSize * gridSize) {
                        numbers = []; paths = {};
                        let step = Math.floor(path.length / pairCount);
                        for(let m=0; m < pairCount; m++) {
                            let sIdx = m * step, eIdx = (m === pairCount - 1) ? path.length - 1 : (m + 1) * step - 1;
                            numbers.push({x: path[sIdx].x, y: path[sIdx].y, val: m+1, color: colors[m]});
                            numbers.push({x: path[eIdx].x, y: path[eIdx].y, val: m+1, color: colors[m]});
                            // ペアごとに2つの「点（線のはじまり）」を用意
                            paths[m+1] = [ [{x: path[sIdx].x, y: path[sIdx].y}], [{x: path[eIdx].x, y: path[eIdx].y}] ];
                        }
                        resolve();
                    } else { setTimeout(attempt, 0); }
                };
                const getDeg = (p, v) => [{x:p.x+1,y:p.y},{x:p.x-1,y:p.y},{x:p.x,y:p.y+1},{x:p.x,y:p.y-1}]
                    .filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !v.has(`${n.x},${n.y}`)).length;
                attempt();
            });
        }

        async function initGame() {
            gridSize = parseInt(document.getElementById('gridSelect').value);
            pairCount = parseInt(document.getElementById('pairSelect').value);
            canvasSize = Math.min(window.innerWidth - 20, 500);
            canvas.width = canvasSize; canvas.height = canvasSize;
            spacing = (canvasSize - padding * 2) / (gridSize - 1);
            statusEl.innerText = "生成中...";
            await generateLevel();
            statusEl.innerText = "両端から引けるよ！タップで消去";
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ddd";
            for(let i=0; i<gridSize; i++) {
                for(let j=0; j<gridSize; j++) {
                    ctx.beginPath(); ctx.arc(padding + i*spacing, padding + j*spacing, 2, 0, Math.PI*2); ctx.fill();
                }
            }
            Object.keys(paths).forEach(val => {
                paths[val].forEach(path => {
                    if (path.length < 1) return;
                    ctx.strokeStyle = colors[val - 1];
                    ctx.lineWidth = spacing * 0.45;
                    ctx.lineCap = "round"; ctx.lineJoin = "round";
                    ctx.beginPath();
                    path.forEach((p, i) => {
                        const vx = padding + p.x * spacing; const vy = padding + p.y * spacing;
                        if (i === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
                    });
                    ctx.stroke();
                });
            });
            let radius = spacing * 0.35;
            ctx.font = `bold ${radius}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            numbers.forEach(num => {
                const x = padding + num.x * spacing, y = padding + num.y * spacing;
                ctx.fillStyle = num.color; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "white"; ctx.fillText(num.val, x, y);
            });
        }

        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const rawX = (e.clientX - rect.left - padding) / spacing, rawY = (e.clientY - rect.top - padding) / spacing;
            const x = Math.round(rawX), y = Math.round(rawY);
            if (Math.abs(rawX - x) < 0.4 && Math.abs(rawY - y) < 0.4 && x >= 0 && x < gridSize && y >= 0 && y < gridSize) return {x, y};
            return null;
        }

        canvas.addEventListener('pointerdown', (e) => {
            const p = getGridPos(e); if (!p) return;
            lastDownPos = p;
            for (let val in paths) {
                for (let i = 0; i < paths[val].length; i++) {
                    const path = paths[val][i];
                    const first = path[0], last = path[path.length - 1];
                    if ((p.x === first.x && p.y === first.y) || (p.x === last.x && p.y === last.y)) {
                        if (p.x === first.x && p.y === first.y) path.reverse();
                        activeVal = val; activePathIdx = i; isDrawing = true;
                        canvas.setPointerCapture(e.pointerId);
                        draw(); return;
                    }
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const p = getGridPos(e); if (!p) return;
            const currentPath = paths[activeVal][activePathIdx];
            const last = currentPath[currentPath.length - 1];
            if (p.x === last.x && p.y === last.y) return;
            if (Math.abs(p.x - last.x) + Math.abs(p.y - last.y) === 1) {
                // 戻る処理
                if (currentPath.length > 1 && p.x === currentPath[currentPath.length-2].x && p.y === currentPath[currentPath.length-2].y) {
                    currentPath.pop(); draw(); return;
                }
                // 合流判定
                const otherPathIdx = 1 - activePathIdx;
                const otherPath = paths[activeVal][otherPathIdx];
                if (otherPath && otherPath.some(pt => pt.x === p.x && pt.y === p.y)) {
                    // 合流！otherPathを逆順にしてcurrentPathにくっつける
                    let targetIdx = otherPath.findIndex(pt => pt.x === p.x && pt.y === p.y);
                    let partToJoin = otherPath.slice(0, targetIdx + 1).reverse();
                    paths[activeVal][activePathIdx] = currentPath.concat(partToJoin);
                    paths[activeVal].splice(otherPathIdx, 1); // 1本になった
                    isDrawing = false; draw(); return;
                }
                // 他の線との衝突判定
                const isOccupied = Object.values(paths).flat().some(path => path.some(pt => pt.x === p.x && pt.y === p.y));
                if (!isOccupied) {
                    currentPath.push(p); draw();
                }
            }
        });

        window.addEventListener('pointerup', (e) => {
            const p = getGridPos(e);
            if (!isDrawing && p && lastDownPos && p.x === lastDownPos.x && p.y === lastDownPos.y) {
                // シングルタップで分断
                for (let val in paths) {
                    for (let i = 0; i < paths[val].length; i++) {
                        const path = paths[val][i];
                        const idx = path.findIndex(pt => pt.x === p.x && pt.y === p.y);
                        if (idx !== -1) {
                            // 数字の上なら線を空にする
                            if (numbers.some(n => n.x === p.x && n.y === p.y)) {
                                paths[val][i] = [{x: p.x, y: p.y}];
                            } else {
                                // 途中のマスならそこで切断して2本に分ける
                                const path1 = path.slice(0, idx);
                                const path2 = path.slice(idx + 1);
                                paths[val] = [path1, path2];
                            }
                            draw(); break;
                        }
                    }
                }
            }
            isDrawing = false; activeVal = null; activePathIdx = null; checkClear(); draw();
        });

        function checkClear() {
            const usedCount = new Set();
            let allConnected = true;
            for (let val in paths) {
                const pSet = paths[val];
                pSet.forEach(path => path.forEach(p => usedCount.add(`${p.x},${p.y}`)));
                if (pSet.length !== 1) allConnected = false; // 1本に統合されていない
            }
            if (usedCount.size === gridSize * gridSize && allConnected) statusEl.innerText = "✨ PERFECT CLEAR! ✨";
        }
        initGame();
    </script>
</body>
</html>
