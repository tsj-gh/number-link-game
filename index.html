<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Line Connect Base</title>
    <style>
        body { text-align: center; font-family: sans-serif; touch-action: none; background: #f0f0f0; }
        canvas { background: white; border: 2px solid #333; display: block; margin: 20px auto; cursor: crosshair; touch-action: none; }
        h1 { font-size: 1.2rem; color: #333; }
    </style>
</head>
<body>
    <h1>数字を繋ぐ土台：なぞってみよう</h1>
    <canvas id="gameCanvas"></canvas>
    <button onclick="clearCanvas()">リセット</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 画面サイズに合わせてキャンバスサイズを設定
        const size = Math.min(window.innerWidth - 40, 400);
        canvas.width = size;
        canvas.height = size;

        let drawing = false;

        // 線の設定
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';

        // 描画開始 (マウス & タップ)
        function start(e) {
            drawing = true;
            draw(e);
        }

        // 描画終了
        function end() {
            drawing = false;
            ctx.beginPath(); // 線のパスをリセット
        }

        // 描画処理
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();

            // タップまたはマウスの座標を取得
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // イベントリスナー（マウスとスマホ両方対応）
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('touchstart', start);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchmove', draw);

        // リセット機能
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
