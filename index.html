<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Connect - Pro Feel</title>
    <style>
        body { text-align: center; font-family: sans-serif; touch-action: none; background: #fdfdfd; margin: 0; padding-top: 10px; }
        .config { background: #eee; padding: 10px; margin-bottom: 10px; font-size: 14px; }
        canvas { background: #fff; border: 1px solid #ddd; display: block; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); touch-action: none; border-radius: 8px; }
        .info { margin: 10px; font-weight: bold; color: #555; min-height: 24px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 20px; border: none; background: #34495e; color: white; font-weight: bold; }
        select { padding: 5px; margin: 0 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="config">
        サイズ: <select id="gridSelect"><option value="4" selected>4x4</option><option value="5">5x5</option><option value="6">6x6</option><option value="8">8x8</option><option value="10">10x10</option></select>
        ペア数: <select id="pairSelect"><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="6">6</option><option value="9">9</option></select>
        <button id="resetBtn" onclick="initGame()">生成</button>
    </div>
    <div id="status" class="info">生成中...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        
        let gridSize, pairCount;
        const padding = 40;
        let spacing, canvasSize;

        let numbers = [];
        let paths = {}; // { val: [{x,y}, ...] } 形式で各数字のパスを保持
        let isDrawing = false;
        let activeVal = null; // 現在引いている数字のID
        let loadingInterval;

        const colors = ["#ff4757", "#2e86de", "#2ed573", "#ffa502", "#a29bfe", "#e17055", "#00cec9", "#6c5ce7", "#fdcb6e"];

        // --- 生成・初期化（アルゴリズムは前回同様） ---
        async function generateLevel() {
            return new Promise((resolve) => {
                const attempt = () => {
                    let path = [];
                    let startX = Math.floor(Math.random() * gridSize);
                    let startY = Math.floor(Math.random() * gridSize);
                    path = [{x: startX, y: startY}];
                    let visited = new Set([`${startX},${startY}`]);
                    for (let i = 0; i < 500; i++) {
                        let last = path[path.length - 1];
                        let neighbors = [{x:last.x+1, y:last.y},{x:last.x-1, y:last.y},{x:last.x, y:last.y+1},{x:last.x, y:last.y-1}]
                            .filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !visited.has(`${n.x},${n.y}`));
                        if (neighbors.length === 0) break;
                        neighbors.sort((a,b) => getDeg(a, visited)-getDeg(b, visited));
                        path.push(neighbors[0]); visited.add(`${neighbors[0].x},${neighbors[0].y}`);
                    }
                    if (visited.size === gridSize * gridSize) {
                        numbers = []; paths = {};
                        let step = Math.floor(path.length / pairCount);
                        for(let m=0; m < pairCount; m++) {
                            let sIdx = m * step;
                            let eIdx = (m === pairCount - 1) ? path.length - 1 : (m + 1) * step - 1;
                            let n1 = {x: path[sIdx].x, y: path[sIdx].y, val: m+1, color: colors[m]};
                            let n2 = {x: path[eIdx].x, y: path[eIdx].y, val: m+1, color: colors[m]};
                            numbers.push(n1, n2);
                            paths[m+1] = [{x: n1.x, y: n1.y}]; // 初期状態は開始点のみ
                        }
                        resolve();
                    } else { setTimeout(attempt, 0); }
                };
                const getDeg = (p, v) => [{x:p.x+1,y:p.y},{x:p.x-1,y:p.y},{x:p.x,y:p.y+1},{x:p.x,y:p.y-1}]
                    .filter(n => n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !v.has(`${n.x},${n.y}`)).length;
                attempt();
            });
        }

        async function initGame() {
            gridSize = parseInt(document.getElementById('gridSelect').value);
            pairCount = parseInt(document.getElementById('pairSelect').value);
            canvasSize = Math.min(window.innerWidth - 20, 500);
            canvas.width = canvasSize; canvas.height = canvasSize;
            spacing = (canvasSize - padding * 2) / (gridSize - 1);
            statusEl.innerText = "生成中...";
            await generateLevel();
            statusEl.innerText = "途中まで引けるよ！";
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ddd";
            for(let i=0; i<gridSize; i++) {
                for(let j=0; j<gridSize; j++) {
                    ctx.beginPath(); ctx.arc(padding + i*spacing, padding + j*spacing, 2, 0, Math.PI*2); ctx.fill();
                }
            }
            // 全てのパスを描画
            Object.keys(paths).forEach(val => {
                const path = paths[val];
                if (path.length < 1) return;
                ctx.strokeStyle = colors[val - 1];
                ctx.lineWidth = spacing * 0.45;
                ctx.lineCap = "round"; ctx.lineJoin = "round";
                ctx.globalAlpha = (isDrawing && activeVal == val) ? 0.6 : 1.0;
                ctx.beginPath();
                path.forEach((p, i) => {
                    const vx = padding + p.x * spacing; const vy = padding + p.y * spacing;
                    if (i === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
                });
                ctx.stroke();
            });
            ctx.globalAlpha = 1.0;
            // 数字の描画
            let radius = spacing * 0.35;
            ctx.font = `bold ${radius}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            numbers.forEach(num => {
                const x = padding + num.x * spacing; const y = padding + num.y * spacing;
                ctx.fillStyle = num.color; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "white"; ctx.fillText(num.val, x, y);
            });
        }

        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left - padding) / spacing);
            const y = Math.round((e.clientY - rect.top - padding) / spacing);
            if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) return {x, y};
            return null;
        }

        // --- 操作ロジック ---
        canvas.addEventListener('pointerdown', (e) => {
            const p = getGridPos(e); if (!p) return;
            // どのパスの端点（開始点または終了点）を触ったか判定
            for (let val in paths) {
                const path = paths[val];
                const first = path[0];
                const last = path[path.length - 1];
                
                if ((p.x === first.x && p.y === first.y) || (p.x === last.x && p.y === last.y)) {
                    activeVal = val;
                    isDrawing = true;
                    canvas.setPointerCapture(e.pointerId);
                    // もし開始点（数字1つ目）を触ったなら、パスを逆転させて「常に末尾から伸ばす」ようにする
                    if (p.x === first.x && p.y === first.y && path.length > 1) {
                        path.reverse();
                    }
                    draw();
                    return;
                }
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const p = getGridPos(e); if (!p) return;
            const path = paths[activeVal];
            const last = path[path.length - 1];
            
            // ルール1: 隣のマスか？
            if (Math.abs(p.x - last.x) + Math.abs(p.y - last.y) === 1) {
                // ルール: 自分のパスを「戻る」場合は消す
                if (path.length > 1 && p.x === path[path.length-2].x && p.y === path[path.length-2].y) {
                    path.pop();
                    draw();
                    return;
                }
                
                // 他の線や数字との衝突判定
                const isOccupied = Object.values(paths).some(otherPath => 
                    otherPath.some(pt => pt.x === p.x && pt.y === p.y)
                );
                
                // ただし、自分のペアの「もう片方の数字」に到達するのはOK
                const targetNum = numbers.find(n => n.x === p.x && n.y === p.y && n.val == activeVal);
                const otherNum = numbers.find(n => n.x === p.x && n.y === p.y && n.val != activeVal);

                if (!isOccupied && !otherNum) {
                    path.push(p);
                    draw();
                } else if (targetNum && p.x !== path[0].x || p.y !== path[0].y) {
                    // ペアのもう片方に着いた
                    path.push(p);
                    draw();
                }
            }
        });

        canvas.addEventListener('pointerup', () => {
            isDrawing = false;
            activeVal = null;
            checkClear();
            draw();
        });

        function checkClear() {
            const usedCount = new Set();
            let allConnected = true;
            for (let val in paths) {
                const path = paths[val];
                path.forEach(p => usedCount.add(`${p.x},${p.y}`));
                // 各ペアが繋がっているか（端点と端点が数字の位置か）
                const first = path[0];
                const last = path[path.length - 1];
                const pair = numbers.filter(n => n.val == val);
                const connected = pair.every(n => 
                    (n.x === first.x && n.y === first.y) || (n.x === last.x && n.y === last.y)
                );
                if (!connected || path.length < 2) allConnected = false;
            }
            if (usedCount.size === gridSize * gridSize && allConnected) {
                statusEl.innerText = "✨ PERFECT CLEAR! ✨";
            }
        }

        initGame();
    </script>
</body>
</html>
